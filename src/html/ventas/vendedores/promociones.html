<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Promociones</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <!-- Font Awesome -->
  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    rel="stylesheet"
  />
  <!-- Estilos generales -->
  <link rel="stylesheet" href="./css/style.css" />
  <!-- Estilos de promociones -->
  <link rel="stylesheet" href="./css/promociones.css" />
  <!-- Importamos también los estilos de clientes -->
  <link rel="stylesheet" href="./css/clientes.css" />
</head>
<body class="clients-body">

  <div class="clients-container">
    <!-- Header -->
    <div class="clients-header">
      <button id="btnBack" class="btn back-btn">
        <i class="fa-solid fa-arrow-left"></i>
      </button>
      <h2 class="clients-title">Promociones</h2>
    </div>

    <!-- Buscador -->
    <div class="search-container">
      <input
        type="text"
        id="searchInput"
        placeholder="Buscar por modelo, tipo o ubicación…"
        autocomplete="off"
      />
      <i class="fa-solid fa-magnifying-glass search-icon"></i>
    </div>

    <!-- Listado scrollable -->
    <div id="promosList" class="clients-list">
      <!-- Aquí se inyectarán las tarjetas de promoción -->
    </div>
  </div>

  <!-- Modal de detalle de promoción -->
  <div id="promoDetailModal" class="detail-modal">
    <div class="detail-content">
      <button id="promoDetailClose" class="detail-close">&times;</button>
      <h3 id="promoDetailTitle"></h3>
      <p id="promoDetailMessage" class="mb-3"></p>
      <img id="promoDetailImage" class="w-100 rounded mb-3" alt="" />
      <table id="promoDetailTable" class="mb-3"></table>
      <div id="promoDetailMap" class="rounded" style="height:200px;"></div>
    </div>
  </div>

  <!-- Modal de posibles clientes -->
  <div id="possibleClientsModal" class="detail-modal">
    <div class="detail-content">
      <button id="possibleClientsClose" class="detail-close">&times;</button>
      <h3>Posibles Clientes</h3>
      <div id="possibleClientsList" class="clients-list"></div>
    </div>
  </div>

  <!-- Bootstrap Bundle JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  ></script>
  <!-- Google Maps API con nueva API key -->
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDzLXOIKYY0N9ay6sKqVBxT1eCnbnL8ZNc&libraries=places&callback=initGoogleMap"
    async defer
  ></script>
  <!-- Lógica de promociones -->
  <script src="./js/promociones.js" defer></script>
</body>
</html>
