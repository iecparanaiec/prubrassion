<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Turnos</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <!-- Font Awesome -->
  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    rel="stylesheet"
  />
  <!-- FullCalendar CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.css"
    rel="stylesheet"
  />
  <!-- Tus estilos -->
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/turnos.css" />
  <link rel="stylesheet" href="./css/clientes.css" />
</head>
<body class="clients-body">

  <div class="clients-container">
    <!-- Header -->
    <div class="clients-header">
      <button id="btnBack" class="btn back-btn">
        <i class="fa-solid fa-arrow-left"></i>
      </button>
      <h2 class="clients-title">Turnos</h2>
    </div>

    <!-- Formulario para agendar -->
    <form id="formTurno" class="row gy-2 gx-3 mb-4">
      <div class="col-6">
        <label for="selTurnoClient" class="form-label text-light">Cliente</label>
        <select id="selTurnoClient" class="form-select" required></select>
      </div>
      <div class="col-6">
        <label for="selTurnoService" class="form-label text-light">Servicio</label>
        <select id="selTurnoService" class="form-select" required></select>
      </div>
      <div class="col-6">
        <label for="inpTurnoDate" class="form-label text-light">Fecha</label>
        <input id="inpTurnoDate" class="form-control" type="date" required />
      </div>
      <div class="col-6">
        <label for="inpTurnoTime" class="form-label text-light">Hora</label>
        <input id="inpTurnoTime" class="form-control" type="time" required />
      </div>
      <div class="col-12 text-end">
        <button type="submit" class="btn sale-btn">
          <i class="fa-solid fa-calendar-plus me-1"></i> Agendar
        </button>
      </div>
    </form>

    <!-- Turnos Hoy (ahora encima del calendario) -->
    <div class="mb-3">
      <h5 class="text-light">Turnos Hoy</h5>
      <ul id="todayAppointments" class="clients-list"></ul>
    </div>

    <!-- Calendario a todo ancho -->
    <div class="mb-3">
      <h5 class="text-light">Calendario</h5>
      <div id="calendar" class="w-100"></div>
    </div>
  </div>

  <!-- Modal para ver turnos de un día -->
  <div id="dayAppointmentsModal" class="detail-modal">
    <div class="detail-content">
      <button id="dayClose" class="detail-close">&times;</button>
      <h3 id="dayAppointmentsTitle"></h3>
      <ul id="dayAppointmentsList" class="clients-list mb-0"></ul>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.js"></script>
  <script src="./js/turnos.js" defer></script>
</body>
</html>
