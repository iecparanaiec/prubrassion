<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>CRM Vendedor – Inicio</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

  <!-- Estilos propios -->
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body class="app-body">

  <!-- ––– Top bar ––– -->


  <!-- ––– Contenido central ––– -->
  <main class="app-main">
    <!-- Usuario -->
    <div class="user-container">
      <img src="https://i.pravatar.cc/70?img=5"
           class="rounded-circle user-avatar"
           alt="avatar" />
      <span class="user-greet">Hola, Tomi</span>
      <button id="btnNotify" class="btn position-relative notify-btn">
        <i class="fa-solid fa-bell"></i>
        <span class="badge bg-danger notify-badge"></span>
      </button>
    </div>

    <!-- Grid de opciones -->
    <div class="tile-container">
      <button class="btn tile" data-url="clientes.html">
        <i class="fa-solid fa-users"></i>
        <span>Clientes</span>
      </button>
      <button class="btn tile" data-url="dashboard.html">
        <i class="fa-solid fa-chart-column"></i>
        <span>Dashboard</span>
      </button>
      <button class="btn tile" data-url="promociones.html">
        <i class="fa-solid fa-bullhorn"></i>
        <span>Promociones</span>
      </button>
      <button class="btn tile" data-url="turnos.html">
        <i class="fa-solid fa-calendar-check"></i>
        <span>Turnos</span>
      </button>

      <!-- Nueva venta abarcando dos columnas -->
      <button class="btn sale-btn" data-url="venta_nueva.html">
        <i class="fa-solid fa-tag"></i>
        <span>Nueva venta</span>
      </button>
    </div>
  </main>
  <!-- ==== Slider de imágenes ==== -->
  <div class="slider-container">
    <div class="slider-track">
      <div class="slide"><img src="/assets/images/slide1.jpg" alt="Slide 1"></div>
      <div class="slide"><img src="/assets/images/slide2.jpg" alt="Slide 2"></div>
      <div class="slide"><img src="/assets/images/slide3.jpg" alt="Slide 3"></div>
    </div>
    <button class="slider-nav prev">&lt;</button>
    <button class="slider-nav next">&gt;</button>
  </div>

  <!-- ––– Navegación inferior ––– -->
  <nav class="bottom-nav d-flex justify-content-around align-items-center">
    <a class="nav-circle" href="/tablero.html">
      <i class="fa-solid fa-screwdriver-wrench"></i>
    </a>
    <a class="nav-circle active" href="index.html">
      <i class="fa-solid fa-house"></i>
    </a>
    <a class="nav-circle" href="chatbot.html">
      <i class="fa-solid fa-robot"></i>
    </a>
  </nav>

  <!-- ––– Modal flotante ––– -->
  <div class="modal fade" id="contentModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-fullscreen-sm-down modal-lg">
      <div class="modal-content bg-dark border-0">
        <div class="modal-body p-0">
          <iframe id="modalFrame" src="" frameborder="0"
                  style="width:100%;height:100%;border-radius:.5rem .5rem 0 0;">
          </iframe>
        </div>
        <div class="modal-footer border-0 justify-content-center">
          <button class="btn btn-outline-light" data-bs-dismiss="modal">Cerrar</button>
        </div>
      </div>
    </div>
  </div>



  <!-- Bootstrap + JS propio -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
