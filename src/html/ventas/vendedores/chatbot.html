<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Chatbot — Viviendas Sion</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Font Awesome -->
  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    rel="stylesheet"
  />

  <!-- Estilos propios -->
  <link rel="stylesheet" href="./css/chatbot.css" />
</head>
<body class="app-body">

  <!-- ––– Header Chat ––– -->
  <header class="chat-header">
    <div class="bot-info">
      <div class="bot-avatar"><i class="fa-solid fa-robot"></i></div>
      <span class="bot-name">Mateo</span>
    </div>
    <button class="btn menu-btn"><i class="fa-solid fa-bars"></i></button>
  </header>

  <!-- ––– Chat Main ––– -->
  <main class="chat-main">
    <div id="chatContainer" class="chat-container">
      <!-- Mensajes inyectados aquí -->
    </div>
    <div class="chat-input">
      <input
        id="chatInput"
        class="form-control"
        type="text"
        placeholder="Escribile a Mateo..."
        autocomplete="off"
      />
      <button id="micBtn" class="btn"><i class="fa-solid fa-microphone"></i></button>
      <button id="sendBtn" class="btn"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  </main>

  <!-- ––– Navegación inferior ––– -->
  <nav class="bottom-nav">
    <a class="nav-circle" href="tablero.html"><i class="fa-solid fa-screwdriver-wrench"></i></a>
    <a class="nav-circle" href="index.html"><i class="fa-solid fa-house"></i></a>
    <a class="nav-circle active" href="chatbot.html"><i class="fa-solid fa-robot"></i></a>
  </nav>

  <!-- Bootstrap + script propio -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/chatbot.js" defer></script>
</body>
</html>
