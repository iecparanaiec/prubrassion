<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Clientes</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <!-- Font Awesome -->
  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    rel="stylesheet"
  />
  <!-- Tus estilos -->
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/clientes.css" />
</head>
<body class="clients-body">

  <div class="clients-container">
    <!-- Header con botón de volver -->
    <div class="clients-header">
      <button id="btnBack" class="btn back-btn">
        <i class="fa-solid fa-arrow-left"></i>
      </button>
      <h2 class="clients-title">Clientes</h2>
    </div>

    <!-- Buscador -->
    <div class="search-container">
      <input
        type="text"
        id="searchInput"
        placeholder="Buscar cliente"
        autocomplete="off"
      />
      <i class="fa-solid fa-magnifying-glass search-icon"></i>
    </div>

    <!-- Listado de clientes -->
    <div id="clientsList" class="clients-list">
      <!-- JS inyectará aquí las tarjetas -->
    </div>
  </div>

  <!-- Modal de detalle de cliente -->
  <div id="clientDetailModal" class="detail-modal">
    <div class="detail-content">
      <button id="detailClose" class="detail-close">&times;</button>
      <h3 id="detailName"></h3>
      <table id="detailTable"></table>
      <!-- Mapa de ubicación -->
      <div
        id="detailMap"
        style="width:100%; height:200px; border-radius:8px; margin-top:12px;"
      ></div>
    </div>
  </div>

  <!-- Google Maps API -->
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB-C_IPlrBJMHXeSILeOjnyTqd2-jVKRig&libraries=places&callback=initGoogleMap"
    async defer
  ></script>
  <!-- Bootstrap Bundle -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  ></script>
  <!-- JS de clientes -->
  <script src="./js/clientes.js" defer></script>
</body>
</html>
