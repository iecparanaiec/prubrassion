<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Área Técnica – Viviendas Sion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- FontAwesome CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- FullCalendar CSS -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.css" rel="stylesheet">
  <style>
    :root { --red:#e71b1b; --dark:#1b1b1b; --mid:#2b2b2b; --light:#f0f0f0; --gray:#6c757d; }
    body { background:var(--dark); color:var(--light); font-family:Arial,sans-serif; padding:1rem; overflow-y:auto; }
    h1 { color:var(--red); margin-bottom:1rem; font-weight:bold; }
    .nav-tabs { border-bottom:2px solid var(--mid); }
    .nav-tabs .nav-link { color:var(--light); background:var(--dark); border:1px solid var(--mid); border-bottom:none; margin-right:.25rem; border-radius:.5rem .5rem 0 0; }
    .nav-tabs .nav-link.active { background:var(--mid); color:var(--red); font-weight:bold; }
    .tab-pane { background:var(--mid); padding:1rem; border:1px solid var(--mid); border-top:none; border-radius:0 0 .5rem .5rem; }
    .form-label { color:var(--light); font-weight:600; }
    .form-control, .form-select, .form-check-input { background:var(--dark); color:var(--light); border:1px solid var(--gray); border-radius:.5rem; }
    .table-dark th, .table-dark td { border-color:var(--mid); }
    .btn-red { background:var(--red); color:#fff; border:none; border-radius:.5rem; }
    .btn-red:hover { background:#c41612; }
    .btn-gray { background:var(--gray); color:#fff; border:none; border-radius:.5rem; }
    .btn-gray:hover { background:#5a646f; }
    #calendar { background:var(--mid); border:1px solid var(--mid); border-radius:.5rem; padding:.5rem; min-height:500px; }
    .fc .fc-toolbar-title, .fc .fc-col-header-cell-cushion, .fc .fc-daygrid-day-number { color:var(--light) !important; }
    .fc .fc-button { background:var(--gray) !important; color:#fff !important; border:none !important; border-radius:.25rem !important; }
    .fc .fc-button:hover { background:var(--mid) !important; }
    .fc .fc-daygrid-event { background:var(--red) !important; color:#fff !important; border-radius:.25rem !important; }
    .modal-content { background:var(--mid); color:var(--light); border-radius:.5rem; }
    .modal-header { border-bottom:1px solid var(--gray); z-index:1051; }
    .modal-backdrop { z-index:1040; }
    .modal-dialog { z-index:1050; }
    .btn-close-white { filter:invert(1); }
    .modal-title { font-weight:bold; color:var(--red); }
    .list-group-item { background:var(--dark); color:var(--light); border:1px solid var(--mid); border-radius:.25rem; margin-bottom:.25rem; }
  </style>
</head>
<body>
  <h1>Área Técnica</h1>
  <!-- Navegación por pestañas -->
  <ul class="nav nav-tabs" id="areaTabs">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#calculos">Cálculos</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#turnos">Turnos</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#servicios">Servicios</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#gestionArchivos">Gestión de archivos</button></li>
  </ul>

  <div class="tab-content mt-3">

    <!-- Pestaña CÁLCULOS -->
    <div class="tab-pane fade show active" id="calculos">
      <button class="btn btn-red mb-3" id="openCalc"><i class="fas fa-calculator me-1"></i> Calcular Materiales</button>
      <div class="modal fade" id="modalCalc">
        <div class="modal-dialog modal-lg modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">Cálculo de Materiales</h5>
              <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <label class="form-label">m² a revestir</label>
              <input id="inpArea" class="form-control mb-3" type="number" min="0">
              <table class="table table-dark table-striped mb-3">
                <thead><tr><th>Material</th><th>Cantidad</th></tr></thead>
                <tbody>
                  <tr><td>Área</td><td id="oArea">-</td></tr>
                  <tr><td>Ladrillos</td><td id="oBricks">-</td></tr>
                  <tr><td>Cemento</td><td id="oCement">-</td></tr>
                  <tr><td>Arena</td><td id="oSand">-</td></tr>
                  <tr><td>Platicor</td><td id="oPlasticor">-</td></tr>
                  <tr><td>Hierro</td><td id="oIron">-</td></tr>
                </tbody>
              </table>
              <label class="form-label">Asignar a cliente</label>
              <select id="selCalcClient" class="form-select mb-3"></select>
            </div>
            <div class="modal-footer">
              <button class="btn btn-gray" data-bs-dismiss="modal">Cancelar</button>
              <button class="btn btn-red" id="calcBtn">Calcular</button>
              <button class="btn btn-red" id="assignBtn">Asignar</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Pestaña TURNOS -->
    <div class="tab-pane fade" id="turnos">
      <form id="formTurno" class="row gy-2 gx-3 mb-4">
        <div class="col-md-3">
          <label class="form-label">Cliente</label>
          <select id="selTurnoClient" class="form-select" required></select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Fecha</label>
          <input id="inpTurnoDate" class="form-control" type="date" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Hora</label>
          <input id="inpTurnoTime" class="form-control" type="time" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Servicio</label>
          <select id="selTurnoService" class="form-select" required></select>
        </div>
        <div class="col-12 text-end">
          <button type="submit" class="btn btn-red"><i class="fas fa-calendar-plus me-1"></i> Agendar</button>
        </div>
      </form>
      <div class="row">
        <div class="col-md-4">
          <h5>Turnos Hoy</h5>
          <ul id="todayAppointments" class="list-group"></ul>
        </div>
        <div class="col-md-8">
          <h5>Calendario</h5>
          <div id="calendar"></div>
        </div>
      </div>
      <!-- Modal Turnos del Día -->
      <div class="modal fade" id="dayAppointmentsModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">Turnos del <span id="dayAppointmentsDate"></span></h5>
              <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <ul id="dayAppointmentsList" class="list-group mb-3"></ul>
              <form id="addTurnoFormDayModal">
                <div class="row gy-2 gx-3">
                  <div class="col-md-4">
                    <label class="form-label">Cliente</label>
                    <select id="dayModalClient" class="form-select" required></select>
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">Servicio</label>
                    <select id="dayModalService" class="form-select" required></select>
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">Hora</label>
                    <input type="time" id="dayModalTime" class="form-control" required>
                  </div>
                </div>
                <button type="submit" class="btn btn-red w-100 mt-3">
                  <i class="fas fa-calendar-plus me-1"></i> Agregar Turno
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Pestaña SERVICIOS -->
    <div class="tab-pane fade" id="servicios">
      <form id="formService" class="mb-4">
        <label class="form-label">Nombre Servicio</label>
        <input id="svcName" class="form-control mb-2" required>
        <label class="form-label">Descripción</label>
        <textarea id="svcDesc" class="form-control mb-2"></textarea>
        <button type="submit" class="btn btn-red">
          <i class="fas fa-save me-1"></i> Guardar Servicio
        </button>
      </form>
      <h5>Lista de Servicios</h5>
      <table class="table table-dark table-striped">
        <thead><tr><th>ID</th><th>Nombre</th><th>Descripción</th><th>Acciones</th></tr></thead>
        <tbody id="svcTable"></tbody>
      </table>
    </div>

    <!-- Pestaña GESTIÓN DE ARCHIVOS -->
    <div class="tab-pane fade" id="gestionArchivos">
      <div class="mb-3">
        <label class="form-label">Todos los clientes</label>
        <div class="d-flex gap-2">
          <input type="file" id="fileTodos" class="form-control" accept=".xls,.xlsx">
          <button class="btn btn-red" id="btnTodosUpload"><i class="fas fa-upload me-1"></i>Subir</button>
          <button class="btn btn-gray" id="btnTodosExport"><i class="fas fa-file-export me-1"></i>Exportar</button>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">VM3</label>
        <div class="d-flex gap-2">
          <input type="file" id="fileVM3" class="form-control" accept=".xls,.xlsx">
          <button class="btn btn-red" id="btnVM3Upload"><i class="fas fa-upload me-1"></i>Subir</button>
          <button class="btn btn-gray" id="btnVM3Export"><i class="fas fa-file-export me-1"></i>Exportar</button>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Reuniones Anexo</label>
        <div class="d-flex gap-2">
          <input type="file" id="fileReuniones" class="form-control" accept=".xls,.xlsx">
          <button class="btn btn-red" id="btnReunionesUpload"><i class="fas fa-upload me-1"></i>Subir</button>
          <button class="btn btn-gray" id="btnReunionesExport"><i class="fas fa-file-export me-1"></i>Exportar</button>
        </div>
      </div>
      <div>
        <label class="form-label">Vencidos</label>
        <div class="d-flex gap-2">
          <input type="file" id="fileVencidos" class="form-control" accept=".xls,.xlsx">
          <button class="btn btn-red" id="btnVencidosUpload"><i class="fas fa-upload me-1"></i>Subir</button>
          <button class="btn btn-gray" id="btnVencidosExport"><i class="fas fa-file-export me-1"></i>Exportar</button>
        </div>
      </div>
    </div>

  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      /* ==== CARGAR CLIENTES ==== */
      const clientes = JSON.parse(localStorage.getItem('todos_data') || '[]');
      const selCalcClient  = document.getElementById('selCalcClient');
      const selTurnoClient = document.getElementById('selTurnoClient');
      const dayModalClient = document.getElementById('dayModalClient');
      const turnsForm      = document.getElementById('formTurno');
      const addDayForm     = document.getElementById('addTurnoFormDayModal');
      const todayList      = document.getElementById('todayAppointments');
      const modalDateSpan  = document.getElementById('dayAppointmentsDate');
      const dayList        = document.getElementById('dayAppointmentsList');
      const svcTurnSelect  = document.getElementById('selTurnoService');
      const svcDaySelect   = document.getElementById('dayModalService');
      const svcNameInp     = document.getElementById('svcName');
      const svcDescInp     = document.getElementById('svcDesc');
      const svcTable       = document.getElementById('svcTable');
      const formService    = document.getElementById('formService');

      // Poblar clientes en selects
      clientes.forEach((c,i) => {
        const nombre = c.Nombre || c.Cliente || `Cliente ${i+1}`;
        selCalcClient.add(new Option(nombre,i));
        selTurnoClient.add(new Option(nombre,i));
        dayModalClient.add(new Option(nombre,i));
      });

      /* ==== CÁLCULOS ==== */
      const modalCalc = new bootstrap.Modal(document.getElementById('modalCalc'));
      document.getElementById('openCalc').addEventListener('click', ()=> modalCalc.show());
      document.getElementById('calcBtn').addEventListener('click', ()=> {
        const area = parseFloat(document.getElementById('inpArea').value) || 0;
        document.getElementById('oArea').textContent   = area.toFixed(2);
        document.getElementById('oBricks').textContent = Math.ceil(area * 50);
        document.getElementById('oCement').textContent = (area * 0.3).toFixed(2);
        document.getElementById('oSand').textContent   = (area * 1.5).toFixed(2);
        document.getElementById('oPlasticor').textContent = (area * 0.2).toFixed(2);
        document.getElementById('oIron').textContent      = (area * 0.1).toFixed(2);
      });
      document.getElementById('assignBtn').addEventListener('click', ()=> {
        // Aquí podrías asociar resultados a cálculo de cliente
        modalCalc.hide();
      });

      /* ==== TURNOS ==== */
      let savedTurns = JSON.parse(localStorage.getItem('turnos') || '[]');
      // Inicializar FullCalendar
      const calendar = new FullCalendar.Calendar(
        document.getElementById('calendar'), {
          initialView: 'dayGridMonth', locale: 'es',
          headerToolbar: { left:'prev,next today', center:'title', right:'dayGridMonth,timeGridWeek,timeGridDay' },
          events: savedTurns.map(ev => ({ title: ev.title, start: ev.start })),
          dateClick: info => {
            modalDateSpan.textContent = info.dateStr;
            dayList.innerHTML = '';
            savedTurns.filter(ev => ev.start.startsWith(info.dateStr))
                      .forEach(ev => {
                        const li = document.createElement('li');
                        li.className = 'list-group-item';
                        li.textContent = `${ev.start.substr(11,5)} – ${ev.title}`;
                        dayList.appendChild(li);
                      });
            new bootstrap.Modal(document.getElementById('dayAppointmentsModal')).show();
          }
        }
      );
      let calendarInitialized = false;
      const turnosTabBtn = document.querySelector('#areaTabs [data-bs-target="#turnos"]');
      turnosTabBtn.addEventListener('shown.bs.tab', () => {
        if (!calendarInitialized) {
          calendar.render();
          calendarInitialized = true;
        } else {
          calendar.updateSize();
        }
      });
      if (turnosTabBtn.classList.contains('active')) {
        calendar.render();
        calendarInitialized = true;
      }
      // Actualizar Turnos Hoy
      function updateToday() {
        const today = new Date().toISOString().split('T')[0];
        todayList.innerHTML = '';
        savedTurns.filter(ev => ev.start.startsWith(today)).forEach(ev => {
          const li = document.createElement('li');
          li.className = 'list-group-item';
          li.textContent = `${ev.start.substr(11,5)} – ${ev.title}`;
          todayList.appendChild(li);
        });
      }
      updateToday();
      // Agregar turno desde formulario principal
      turnsForm.addEventListener('submit', e => {
        e.preventDefault();
        const idx   = selTurnoClient.value;
        const date  = document.getElementById('inpTurnoDate').value;
        const time  = document.getElementById('inpTurnoTime').value;
        const svc   = svcTurnSelect.selectedOptions[0].text;
        if (!date||!time) return;
        const name  = clientes[idx].Nombre || clientes[idx].Cliente;
        const title = `${name} – ${svc}`;
        const start = `${date}T${time}`;
        savedTurns.push({ title, start });
        localStorage.setItem('turnos', JSON.stringify(savedTurns));
        calendar.addEvent({ title, start });
        updateToday(); e.target.reset();
      });
      // Agregar turno desde modal día
      addDayForm.addEventListener('submit', e => {
        e.preventDefault();
        const idx   = dayModalClient.value;
        const time  = document.getElementById('dayModalTime').value;
        const svc   = svcDaySelect.selectedOptions[0].text;
        const date  = document.getElementById('dayAppointmentsDate').textContent;
        if (!time) return;
        const name  = clientes[idx].Nombre || clientes[idx].Cliente;
        const title = `${name} – ${svc}`;
        const start = `${date}T${time}`;
        savedTurns.push({ title, start });
        localStorage.setItem('turnos', JSON.stringify(savedTurns));
        calendar.addEvent({ title, start });
        updateToday();
        bootstrap.Modal.getInstance(document.getElementById('dayAppointmentsModal')).hide();
      });

      /* ==== SERVICIOS ==== */
      let servicios = JSON.parse(localStorage.getItem('servicios') || '[]');
      function renderServices() {
        svcTable.innerHTML = '';
        servicios.forEach((s,i) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${i+1}</td>
            <td>${s.nombre}</td>
            <td>${s.descripcion||''}</td>
            <td>
              <button class="btn btn-sm btn-gray btn-delete" data-index="${i}"><i class="fas fa-trash"></i></button>
            </td>`;
          svcTable.appendChild(tr);
        });
        // repoblar selects
        [svcTurnSelect, svcDaySelect].forEach(sel => {
          sel.innerHTML = '';
          servicios.forEach((s,i) => sel.add(new Option(s.nombre, i)));
        });
      }
      renderServices();
      formService.addEventListener('submit', e => {
        e.preventDefault();
        const nombre = svcNameInp.value.trim();
        const desc   = svcDescInp.value.trim();
        if (!nombre) return;
        servicios.push({ nombre, descripcion: desc });
        localStorage.setItem('servicios', JSON.stringify(servicios));
        formService.reset(); renderServices();
      });
      svcTable.addEventListener('click', e => {
        const btn = e.target.closest('.btn-delete'); if (!btn) return;
        const idx = btn.dataset.index;
        servicios.splice(idx,1);
        localStorage.setItem('servicios', JSON.stringify(servicios)); renderServices();
      });

      /* ==== GESTIÓN DE ARCHIVOS ==== */
      const sheets = {
        todos:     { file:'fileTodos', upload:'btnTodosUpload', export:'btnTodosExport', expected:'Nro Contrato' },
        vm3:       { file:'fileVM3', upload:'btnVM3Upload', export:'btnVM3Export', expected:'Cliente' },
        reuniones: { file:'fileReuniones', upload:'btnReunionesUpload', export:'btnReunionesExport', expected:'Nro Contrato' },
        vencidos:  { file:'fileVencidos', upload:'btnVencidosUpload', export:'btnVencidosExport', expected:'Nro Contrato' }
      };

      function parseSheet(key, raw) {
        const wb = XLSX.read(raw, { type:'binary' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const all = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
        const idx = all.findIndex(r => r.includes(sheets[key].expected));
        if (idx < 0) return alert('No se encontró la cabecera para ' + key);
        const headers = all[idx].map(h => { const t = String(h).trim(); return t && !/EMPTY/.test(t) ? t : null; });
        const data = all.slice(idx+1)
          .map(r => { let o = {}; headers.forEach((h,i)=>{ if(h) o[h]=r[i]; }); return o; })
          .filter(r => Object.values(r).some(v => v !== ''));
        localStorage.setItem(key + '_data', JSON.stringify(data));
        alert('Datos guardados en ' + key);
      }

      Object.keys(sheets).forEach(key => {
        const cfg = sheets[key];
        const fileInput = document.getElementById(cfg.file);
        document.getElementById(cfg.upload).addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', e => {
          const f = e.target.files[0]; if (!f) return;
          const r = new FileReader();
          r.onload = ev => parseSheet(key, ev.target.result);
          r.readAsBinaryString(f);
          e.target.value='';
        });
        document.getElementById(cfg.export).addEventListener('click', () => {
          const data = JSON.parse(localStorage.getItem(key + '_data') || '[]');
          if (!data.length) return alert('No hay datos para exportar');
          const wb = XLSX.utils.book_new();
          const ws = XLSX.utils.json_to_sheet(data);
          XLSX.utils.book_append_sheet(wb, ws, key);
          XLSX.writeFile(wb, `${key}_${new Date().toISOString().slice(0,10)}.xlsx`);
        });
      });
    });
  </script>
</body>
</html>
