<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Clientes – Viviendas Sion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap + FontAwesome -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <!-- Tabulator (grid) -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/tabulator-tables@5.5.2/dist/css/tabulator_midnight.min.css">

  <!-- Estilos globales + clientes -->
  <link rel="stylesheet" href="/assets/css/styles.css">
  <link rel="stylesheet" href="/assets/css/clientes.css">
</head>

<body class="bg-dark text-light">
  <header class="topbar d-flex align-items-center ps-3 pe-4">
    <h1 class="m-0 text-light fs-4">
      <i class="fas fa-users me-2"></i>Clientes
    </h1>
    <span class="flex-grow-1"></span>
    <small id="fecha" class="text-light-50"></small>
  </header>

  <main class="container-fluid py-4 px-md-5">
    <!-- Barra utilidades -->
    <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
      <label class="btn btn-danger d-flex align-items-center gap-1 m-0">
        <i class="fas fa-file-import"></i> Subir Excel
        <input id="excelInput" type="file" accept=".xlsx,.xls" hidden />
      </label>

      <button id="exportBtn"
              class="btn btn-success d-flex align-items-center gap-1 d-none">
        <i class="fas fa-file-export"></i> Exportar Excel
      </button>

      <button id="addRowBtn"
              class="btn btn-primary btn-sm d-none">
        <i class="fas fa-plus me-1"></i>+ Fila
      </button>

      <button id="saveBtn"
              class="btn btn-warning btn-sm d-none">
        <i class="fas fa-save me-1"></i>Guardar
      </button>
    </div>

    <!-- Pestañas -->
    <ul id="tabs" class="nav nav-pills mb-3"></ul>

    <!-- Contenido -->
    <div id="panes"></div>
  </main>

  <!-- Librerías -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tabulator-tables@5.5.2/dist/js/tabulator.min.js"></script>

  <!-- Lógica -->
  <script src="/clientes.bundle.js"></script>
</body>
</html>
