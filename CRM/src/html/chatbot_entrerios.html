<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <!-- Evita zoom en iOS -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <title>Chat con Rocío 🤖</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto&display=swap"
    rel="stylesheet"
  />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Font Awesome -->
  <script
    src="https://kit.fontawesome.com/a076d05399.js"
    crossorigin="anonymous"
  ></script>
  <style>
    
/* Reset básico */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Roboto', sans-serif;
  background: url("/assets/images/background.svg") no-repeat center center;
  background-size: cover;
  height: 100vh;
  overflow: hidden;
}

.chat-wrapper {
  display: flex;
  flex-direction: column;
  width: 100%;
  height: 100%;
}

/* Barra superior: Aumentada en altura y con íconos en proporción */
.chat-header {
  background: linear-gradient(to right, #1f1f1f, #2a2a2a, #1f1f1f);
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: #fff;
  padding: 16px;        /* Aumentado */
  min-height: 40px;     /* Aumentado */
}

.header-left, .header-right {
  display: flex;
  align-items: center;
  gap: 15px;
}

/* Íconos de la barra superior aumentados */
.chat-header .icon {
  width: 32px;
  height: 32px;
  cursor: pointer;
}

.profile-pic {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  object-fit: cover;
}

.chat-name {
  font-weight: bold;
  font-size: 18px;
}

/* Área de mensajes */
.chat-log {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  display: flex;           /* Asegura uso de flexbox */
  flex-direction: column;
}

/* Burbujas de mensaje */
.message {
  display: block;
  max-width: 75%;
  margin: 6px 0;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 14px;
  line-height: 1.4;
  word-wrap: break-word;
}

/* Mensaje del usuario (derecha, verde claro) */
.user {
  background: #005c4b;
  color: #fff;
  align-self: flex-end; /* Alineado a la derecha */
  margin: 6px 0;
  border-radius: 8px;
  padding: 8px 12px;
}
/* Mensaje del "bot" (izquierda, blanco) */
.bot {
  background: #363636;  /* Color oficial del receptor */
  color: #fff;
  align-self: flex-start; /* Posición a la izquierda */
  margin: 6px 0;
  border-radius: 8px;
  padding: 8px 12px;
}

/* Hora dentro del mensaje */
.message-time {
  display: block;
  text-align: right;
  font-size: 11px;
  color: rgba(255, 255, 255, 0.5);
  margin-top: 4px;
}

/* Barra inferior: Solo se modifican los colores */
.chat-input {
  display: flex;
  align-items: center;
  background: #1f1f1f; /* Color de la barra inferior */
  padding: 8px;
  gap: 8px;
  max-height: 65px;
}
.chat-input .icon {
  width: 28px;       /* Reduce el ancho */
  height: 28px;      /* Reduce la altura */
}
/* Ícono + a la izquierda */
.plus-icon {
  flex-shrink: 0;
}

/* Envoltorio del input y sticker */
.input-wrapper {
  position: relative;
  flex: 1;
}

.input-wrapper input {
  width: 100%;
  border: none;
  border-radius: 20px;
  padding: 8px 36px 8px 12px; /* Dejamos espacio para el sticker */
  font-size: 14px;
  outline: none;
  background: #36383b; /* Fondo del bloque de texto */
  color: #fff;
}

/* Ícono de sticker dentro del input */
.sticker-icon {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
}

/* Íconos a la derecha (cámara y micro) */
#cameraIcon,
#micIcon {
  flex-shrink: 0;
}

/* Botón de enviar */
#sendButton {
  display: none; /* Se mostrará al escribir */
  width: 33px;
  height: 33px;
  background-color: #25D366; /* Verde enviar */
  border: none;
  border-radius: 50%;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.send-icon {
  width: 20px;
  height: 20px;
  transform: rotate(180deg); 
  filter: invert(0%) sepia(0%) saturate(0%) hue-rotate(0deg) brightness(0.2);
}

/* Indicador "escribiendo..." */
.typing-indicator {
  display: flex;
  align-items: center;
  gap: 2px;
  background: #333;         /* Dark gray */
  color: #fff;
  border-radius: 10px;
  padding: 8px 2px;         /* Aumenta el padding vertical */
  margin: 6px 0;
  max-width: 40px;
  min-height: 30px;         /* Fuerza un alto mínimo */
}

.dot {
  width: 6px;
  height: 6px;
  background-color: #888;
  border-radius: 50%;
  animation: blink 1.4s infinite ease-in-out both;
}

.dot:nth-child(2) {
  animation-delay: 0.2s;
}
.dot:nth-child(3) {
  animation-delay: 0.4s;
}

@keyframes blink {
  0%, 80%, 100% {
    opacity: 0;
  }
  40% {
    opacity: 1;
  }
}

/* Scroll custom */
.chat-log::-webkit-scrollbar {
  width: 6px;
}
.chat-log::-webkit-scrollbar-thumb {
  background: #ccc;
  border-radius: 3px;
}

/* Responsive */
@media screen and (max-width: 600px) {
  .header-left, .header-right {
    gap: 10px;
  }
  .chat-header .icon {
    width: 28px;
    height: 28px;
  }
  .profile-pic {
    width: 36px;
    height: 36px;
  }
  #sendButton {
    width: 36px;
    height: 36px;
  }
  .send-icon {
    width: 18px;
    height: 18px;
  }
}



  </style>
</head>
<body>
  <div class="chat-wrapper">
    
    <!-- Barra superior -->
    <div class="chat-header">
      <div class="header-left">
        <!-- Flecha para volver -->
        <img 
          src="/assets/images/flecha.svg" 
          alt="Volver" 
          class="icon back-icon" 
        />
        <!-- Foto de perfil -->
        <img 
          src="/assets/images/perfil.svg" 
          alt="Foto de perfil" 
          class="icon profile-pic" 
        />
        <!-- Nombre del chat -->
        <span class="chat-name">Rocío</span>
      </div>
      <div class="header-right">
        <img 
          src="/assets/images/videocamara.svg" 
          alt="Videollamada" 
          class="icon" 
        />
        <img 
          src="/assets/images/telefono.svg" 
          alt="Llamada" 
          class="icon" 
        />
      </div>
    </div>
    
    <!-- Área de mensajes -->
    <div class="chat-log" id="chatLog"></div>

    <!-- Barra inferior -->
    <div class="chat-input">
      <!-- Ícono + a la izquierda (siempre visible) -->
      <img 
        src="/assets/images/+.svg" 
        alt="Adjuntar" 
        class="icon plus-icon" 
      />

      <!-- Contenedor del input y sticker -->
      <div class="input-wrapper">
        <input 
          type="text" 
          id="userInput" 
          placeholder="Escribe algo..." 
          oninput="toggleIcons()" 
          onkeydown="handleKey(event)"
        />
        <!-- Ícono sticker dentro del input -->
        <img 
          src="/assets/images/sticker.svg" 
          alt="Sticker" 
          class="icon sticker-icon"
        />
      </div>

      <!-- Íconos a la derecha (se ocultan al escribir) -->
      <img 
        src="/assets/images/camara.svg" 
        alt="Cámara" 
        class="icon" 
        id="cameraIcon"
      />
      <img 
        src="/assets/images/microfono.svg" 
        alt="Micrófono" 
        class="icon" 
        id="micIcon"
      />

      <!-- Botón de enviar (se muestra al escribir) -->
      <button id="sendButton" style="display: none;" onclick="sendMessage()">
        <img src="/assets/images/flecha.svg" alt="Enviar" class="send-icon" />
      </button>
    </div>
  </div>

  <script>
    const chatLog = document.getElementById("chatLog");
    const input = document.getElementById("userInput");
    const sendButton = document.getElementById("sendButton");
    const inputIcons = document.getElementById("inputIcons");
    const micIcon = document.getElementById("micIcon");

    // Función para obtener la hora en formato 12h
    function getCurrentTime() {
      const now = new Date();
      let hours = now.getHours();
      let minutes = now.getMinutes();
      const ampm = hours >= 12 ? 'p.m.' : 'a.m.';
      hours = hours % 12 || 12;
      if (minutes < 10) minutes = '0' + minutes;
      return hours + ':' + minutes + ' ' + ampm;
    }

    function toggleIcons() {
      if (input.value.trim().length > 0) {
        sendButton.style.display = "inline-block";
        cameraIcon.style.display = "none";
        micIcon.style.display = "none";
      } else {
        sendButton.style.display = "none";
        cameraIcon.style.display = "inline-block";
        micIcon.style.display = "inline-block";
      }
    }

    function appendMessage(role, text, isMarkdown = false) {
      const div = document.createElement("div");
      // "Vos" -> globo verde (.user). "Rocío" -> globo gris (.bot)
      div.classList.add("message");
      div.classList.add(role === "Vos" ? "user" : "bot");

      const content = isMarkdown ? marked.parse(text) : text;
      div.innerHTML = content + `<div class="message-time">${getCurrentTime()}</div>`;
      
      chatLog.appendChild(div);
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    function showTypingIndicator() {
      const typingDiv = document.createElement("div");
      typingDiv.classList.add("typing-indicator");
      typingDiv.id = "typing-indicator";
      typingDiv.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
      chatLog.appendChild(typingDiv);
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    function removeTypingIndicator() {
      const typingDiv = document.getElementById("typing-indicator");
      if (typingDiv) typingDiv.remove();
    }

    function handleKey(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;

      // Mensaje verde (a la derecha)
      appendMessage("Vos", message);
      input.value = "";
      toggleIcons();

      const sessionId = "chat_usuario_" + Date.now();

      try {
        // Hacemos la petición al webhook
        const response = await fetch("https://n8n.smarteco.com.ar/webhook/atencion_cliente", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ message, sessionId }),
        });

        if (response.ok) {
          const data = await response.json();
          const fullMessage = data[0].output || "No se recibió respuesta.";
          // Dividimos la respuesta en partes
          const parts = fullMessage.split(/\n{2,}/);

          // Para cada parte, mostramos los 3 puntitos con un delay proporcional y luego mostramos la respuesta
          for (let i = 0; i < parts.length; i++) {
            showTypingIndicator();
            // Calculamos el delay: mayor duración según la cantidad de caracteres
            const delay = 1500 + parts[i].length * 15;
            await new Promise(resolve => setTimeout(resolve, delay));
            removeTypingIndicator();
            appendMessage("Rocío", parts[i], true);
          }
        } else {
          appendMessage("Rocío", "Hubo un error al procesar tu mensaje.");
        }
      } catch (err) {
        appendMessage("Error", "No se pudo conectar con Rocío.");
      }
    }
    window.addEventListener('load', () => {
      toggleIcons();
    });
  </script>
</body>
</html>
