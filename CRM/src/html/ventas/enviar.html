<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Enviar Promoción — CRM ViviendaCión</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
    rel="stylesheet"
  />
  <!-- Font Awesome -->
  <link 
    rel="stylesheet" 
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />

  <style>
    :root {
      --dark-bg: #121212;
      --dark-secondary: #1e1e2e;
      --dark-tertiary: #2d2d42;
      --text-light: #e0e0e0;
      --text-muted: #adb5bd;
      --primary-blue: #0d6efd;
    }
    body {
      background: var(--dark-bg);
      color: var(--text-light);
      padding: 2rem;
    }
    .promo-data {
      background: var(--dark-secondary);
      border-radius: .25rem;
      padding: 1rem;
      margin-bottom: 1.5rem;
    }
    .promo-data h4, .promo-data ul li { color: #fff; }
    .clients-table {
      background: var(--dark-secondary);
      border-radius: .25rem;
      overflow-y: auto;
      max-height: 300px;
    }
    #clients-table th, #clients-table td {
      color: var(--text-light);
    }
    .btn-primary {
      background: var(--primary-blue);
      border-color: var(--primary-blue);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="mb-4"><i class="fas fa-paper-plane me-2"></i>Enviar Promoción</h1>

    <!-- Detalles -->
    <div id="promoDetails" class="promo-data">
      <h4>Detalles de la Promoción</h4>
      <ul class="list-unstyled">
        <li><strong>ID:</strong> <span id="p-id"></span></li>
        <li><strong>Modelo:</strong> <span id="p-modelo"></span></li>
        <li><strong>Tipo:</strong> <span id="p-tipo"></span></li>
        <li><strong>Ubicación:</strong> <span id="p-ubicacion"></span></li>
        <li><strong>Ciudades dentro del radio:</strong> <span id="p-ciudades"></span></li>
        <li><strong>Período:</strong> <span id="p-periodo"></span></li>
        <li><strong>Horario:</strong> <span id="p-horario"></span></li>
      </ul>
    </div>

    <!-- Clientes filtrados -->
    <div id="clientsSection" class="d-none">
      <h4 class="text-light">Clientes potenciales en el área</h4>
      <div class="clients-table mb-3">
        <table class="table table-dark table-hover mb-0" id="clients-table">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Ciudad</th>
              <th>Contacto</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <button id="btnSendAll" class="btn btn-primary">
        <i class="fas fa-paper-plane me-2"></i>Enviar a todos
      </button>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- SheetJS (para Excel) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <script>
  (function(){
    // 1) Leer ID de la URL
    const params = new URLSearchParams(location.search);
    const promoId = params.get('id');
    if (!promoId) {
      alert('Falta el ID de la promoción.');
      return;
    }

    // 2) Cargar promoción desde localStorage
    const promos = JSON.parse(localStorage.getItem('promociones')) || [];
    const promo = promos.find(p => String(p.id) === promoId);
    if (!promo) {
      alert('Promoción no encontrada.');
      return;
    }

    // 3) Mostrar datos
    document.getElementById('p-id').textContent         = promo.id;
    document.getElementById('p-modelo').textContent    = promo.modelo;
    document.getElementById('p-tipo').textContent      = promo.tipo;
    document.getElementById('p-ubicacion').textContent = promo.ubicacion;
    document.getElementById('p-ciudades').textContent  = promo.ciudades;
    // Período
    const per = promo.startDate && promo.endDate
      ? promo.startDate.split('-').reverse().join('/') + ' – ' +
        promo.endDate.split('-').reverse().join('/')
      : '—';
    document.getElementById('p-periodo').textContent = per;
    // Horario
    const hor = promo.startTime && promo.endTime
      ? promo.startTime + ' – ' + promo.endTime
      : '—';
    document.getElementById('p-horario').textContent = hor;

    // 4) Leer clientes desde localStorage
    const rawClients = localStorage.getItem('possibleClients');
    if (!rawClients) {
      alert('No se cargó ningún Excel de clientes en la pestaña Promociones.');
      return;
    }
    const clients = JSON.parse(rawClients);
    // Filtrar por ciudad
    const promoCities = promo.ciudades.split(',').map(c=>c.trim().toLowerCase());
    const filtered = clients.filter(r => 
      r.Ciudad && promoCities.includes(String(r.Ciudad).toLowerCase())
    );
    renderClients(filtered);

    // Render tabla
    function renderClients(list) {
      const tbody = document.querySelector('#clients-table tbody');
      list.forEach(c => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${c.Nombre||''}</td>
          <td>${c.Ciudad||''}</td>
          <td>${c.Contacto||''}</td>
        `;
        tbody.appendChild(tr);
      });
      document.getElementById('clientsSection').classList.remove('d-none');
    }

    // 5) Botón Enviar
    document.getElementById('btnSendAll').addEventListener('click', function() {
      const count = document.querySelectorAll('#clients-table tbody tr').length;
      alert('Enviando promoción a ' + count + ' clientes...');
      // => aquí tu llamada a API, SMTP, etc.
    });
  })();
  </script>
</body>
</html>
