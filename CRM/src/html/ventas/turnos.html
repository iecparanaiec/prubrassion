<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Turnos — CRM Viviendas Sion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- FontAwesome CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <!-- FullCalendar CSS -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.css" rel="stylesheet" />
  <style>
    :root { --red:#e71b1b; --dark:#1b1b1b; --mid:#2b2b2b; --light:#f0f0f0; --gray:#6c757d; }
    body { background:var(--dark); color:var(--light); font-family:Arial,sans-serif; overflow-y:auto; }
    .navbar { background:var(--mid); }
    .nav-link { color:var(--light) !important; }
    .nav-link.active { color:var(--red) !important; font-weight:bold; }
    .container-main { padding:1rem; max-width:100% !important; }
    h1 { color:var(--red); margin-bottom:1rem; font-weight:bold; }
    .form-label { color:var(--light); font-weight:600; }
    .form-control, .form-select { background:var(--dark); color:var(--light); border:1px solid var(--gray); border-radius:.5rem; }
    .btn-red { background:var(--red); color:#fff; border:none; border-radius:.5rem; }
    .btn-red:hover { background:#c41612; }
    #calendar { background:var(--mid); border:1px solid var(--mid); border-radius:.5rem; padding:.5rem; min-height:500px; width:100%; }
    .fc .fc-toolbar-title,
    .fc .fc-col-header-cell-cushion,
    .fc .fc-daygrid-day-number { color:var(--light) !important; }
    .fc .fc-button { background:var(--gray) !important; color:#fff !important; border:none !important; border-radius:.25rem !important; }
    .fc .fc-button:hover { background:var(--mid) !important; }
    .fc .fc-daygrid-event { background:var(--red) !important; color:#fff !important; border-radius:.25rem !important; }
    .modal-content { background:var(--mid); color:var(--light); border-radius:.5rem; }
    .modal-header { border-bottom:1px solid var(--gray); }
    .modal-backdrop { z-index:1040; }
    .modal-dialog { z-index:1050; }
    .btn-close-white { filter:invert(1); }
    .modal-title { font-weight:bold; color:var(--red); }
    .list-group-item { background:var(--dark); color:var(--light); border:1px solid var(--mid); border-radius:.25rem; margin-bottom:.25rem; }
  </style>
</head>
<body>
  <!-- Barra de navegación global -->
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <ul class="nav nav-tabs">
        <li class="nav-item"><a class="nav-link" href="vendedores.html"><i class="fas fa-users"></i> Vendedores</a></li>
        <li class="nav-item"><a class="nav-link active" href="turnos.html"><i class="fas fa-calendar-alt"></i> Turnos</a></li>
        <li class="nav-item"><a class="nav-link" href="promociones.html"><i class="fas fa-bullhorn"></i> Promociones</a></li>
      </ul>
    </div>
  </nav>

  <!-- Contenido principal -->
  <div class="container-main">
    <h1>Turnos</h1>
    <form id="formTurno" class="row gy-2 gx-3 mb-4">
      <div class="col-md-2">
        <label for="selTurnoClient" class="form-label">Cliente</label>
        <select id="selTurnoClient" class="form-select" required></select>
      </div>
      <div class="col-md-2">
        <label for="selTurnoService" class="form-label">Servicio</label>
        <div class="input-group">
          <select id="selTurnoService" class="form-select" required></select>
          <button type="button" id="btnAddService" class="btn btn-outline-light" title="Agregar servicio">
            <i class="fas fa-plus"></i>
          </button>
        </div>
      </div>
      <div class="col-md-2">
        <label for="inpTurnoDate" class="form-label">Fecha</label>
        <input id="inpTurnoDate" class="form-control" type="date" required />
      </div>
      <div class="col-md-2">
        <label for="inpTurnoTime" class="form-label">Hora</label>
        <input id="inpTurnoTime" class="form-control" type="time" required />
      </div>
      <div class="col-md-2 d-flex flex-column justify-content-end">
        <div class="form-check d-flex align-items-center mb-2">
          <input class="form-check-input me-2" type="checkbox" id="chkAssignVendor" />
          <label class="form-check-label mb-0 text-light" for="chkAssignVendor">Vendedor</label>
        </div>
        <select id="selVendor" class="form-select" style="display:none;"></select>
      </div>
      <div class="col-md-2 d-flex align-items-end justify-content-end">
        <button type="submit" class="btn btn-red"><i class="fas fa-calendar-plus me-1"></i> Agendar</button>
      </div>
    </form>

    <div class="row">
      <div class="col-md-4">
        <h5>Turnos Hoy</h5>
        <ul id="todayAppointments" class="list-group"></ul>
      </div>
      <div class="col-md-8">
        <h5>Calendario</h5>
        <div id="calendar"></div>
      </div>
    </div>

    <!-- Modal para ver turnos de un día -->
    <div class="modal fade" id="dayAppointmentsModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Turnos del día</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <ul id="dayAppointmentsList" class="list-group mb-0"></ul>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal Agregar Servicio -->
    <div class="modal fade" id="addServiceModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Agregar Servicio</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <label for="newServiceName" class="form-label">Nombre del servicio</label>
            <input id="newServiceName" class="form-control" type="text" />
          </div>
          <div class="modal-footer">
            <button type="button" id="addServiceSave" class="btn btn-red">Guardar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/locales-all.global.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // CRM: clientes, servicios y vendedores
      const clients = JSON.parse(localStorage.getItem('todos_data') || '[]');
      let services = JSON.parse(localStorage.getItem('servicios') || '[]');
      const vendors  = JSON.parse(localStorage.getItem('vendedores') || '[]');
      const saved    = JSON.parse(localStorage.getItem('turnos') || '[]');

      // Elementos formulario
      const selClient    = document.getElementById('selTurnoClient');
      const selService   = document.getElementById('selTurnoService');
      const btnAddSrv    = document.getElementById('btnAddService');
      const addSrvModal  = new bootstrap.Modal(document.getElementById('addServiceModal'));
      const addSrvSave   = document.getElementById('addServiceSave');
      const newSrvInp    = document.getElementById('newServiceName');
      const chkVendor    = document.getElementById('chkAssignVendor');
      const selVendor    = document.getElementById('selVendor');
      const form         = document.getElementById('formTurno');
      const todayList    = document.getElementById('todayAppointments');

      // Poblar clientes
      clients.forEach((c,i) => selClient.add(new Option(c.Nombre||c.Cliente||`Cliente ${i+1}`, i)));
      // Poblar vendedores
      vendors.forEach((v,i) => selVendor.add(new Option(v.Nombre||v.name||`Vendedor ${i+1}`, i)));
      // Función repoblar servicios
      function loadServices() {
        selService.innerHTML = '';
        services.forEach((s,i) => selService.add(new Option(s.nombre||s.name||`Servicio ${i+1}`, i)));
      }
      loadServices();

      // Mostrar/ocultar selector vendedor
      chkVendor.addEventListener('change', () => {
        selVendor.style.display = chkVendor.checked ? 'block' : 'none';
      });

      // Agregar servicio
      btnAddSrv.addEventListener('click', () => addSrvModal.show());
      addSrvSave.addEventListener('click', () => {
        const val = newSrvInp.value.trim(); if (!val) return;
        services.push({ nombre: val });
        localStorage.setItem('servicios', JSON.stringify(services));
        loadServices(); newSrvInp.value = ''; addSrvModal.hide();
      });

      // Inicializar FullCalendar
      const calendar = new FullCalendar.Calendar(
        document.getElementById('calendar'),
        {
          initialView: 'dayGridMonth', locale: 'es',
          headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek,timeGridDay' },
          events: saved.map(ev => ({ title: ev.title, start: ev.start })),
          dateClick: info => {
            const dayList = document.getElementById('dayAppointmentsList');
            dayList.innerHTML = '';
            saved.filter(ev => ev.start.startsWith(info.dateStr)).forEach(ev => {
              const li = document.createElement('li'); li.className='list-group-item';
              li.textContent = `${ev.start.substr(11,5)} - ${ev.title}`;
              dayList.appendChild(li);
            });
            new bootstrap.Modal(document.getElementById('dayAppointmentsModal')).show();
          }
        }
      ); calendar.render();

      // Mostrar turnos hoy
      function updateToday() {
        const today = new Date().toISOString().split('T')[0];
        todayList.innerHTML = '';
        saved.filter(ev => ev.start.startsWith(today)).forEach(ev => {
          const li = document.createElement('li'); li.className='list-group-item';
          li.textContent = `${ev.start.substr(11,5)} - ${ev.title}`;
          todayList.appendChild(li);
        });
      }
      updateToday();

      // Agendar turno con posible vendedor
      form.addEventListener('submit', e => {
        e.preventDefault();
        const cIdx = selClient.value, sIdx = selService.value;
        const d = document.getElementById('inpTurnoDate').value;
        const t = document.getElementById('inpTurnoTime').value;
        if (!d||!t) return;
        let title = `${clients[cIdx].Nombre||clients[cIdx].Cliente} — ${services[sIdx].nombre||services[sIdx].name}`;
        if (chkVendor.checked) {
          const v = vendors[selVendor.value];
          title += ` (Vendedor: ${v.Nombre||v.name})`;
        }
        const start = `${d}T${t}`;
        saved.push({ title, start });
        localStorage.setItem('turnos', JSON.stringify(saved));
        calendar.addEvent({ title, start });
        updateToday();
        form.reset(); selVendor.style.display='none'; chkVendor.checked=false;
      });
    });
  </script>
</body>
</html>
