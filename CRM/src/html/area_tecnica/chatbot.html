<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat con Rocío</title>
  <link href="https://fonts.googleapis.com/css?family=Roboto&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <style>
    :root {
      --primary-color: #c1272d;      /* Rojo más sobrio */
      --bg-color: #222121;
      --text-color: #b9b9b9;
      --header-bg: #1b1b1b;
      --popup-bg: #2b2b2b;
      --border-color: #555353;
    }
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: 'Roboto', sans-serif;
      background: var(--popup-bg);
      color: var(--text-color);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    /* CONTENEDOR DE MENSAJES */
    .chat-log {
      flex: 1;
      padding: 16px;
      background: var(--bg-color);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .message.user {
      align-self: flex-end;
      background: var(--primary-color);
      color: #fff;
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 80%;
    }
    .message.bot {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      max-width: 80%;
    }
    .bot-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border-color);
      flex-shrink: 0;
    }
    .bubble {
      background: var(--popup-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
      padding: 10px 14px;
      border-radius: 12px;
      position: relative;
      line-height: 1.4;
    }
    .bubble::before {
      content: '';
      position: absolute;
      top: 12px;
      left: -8px;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-right: 8px solid var(--popup-bg);
    }
    /* INPUT */
    .chat-input {
      background: var(--header-bg);
      padding: 10px 16px;
      display: flex;
      gap: 8px;
      border-top: 1px solid var(--border-color);
    }
    .chat-input input {
      flex: 1;
      padding: 10px 12px;
      border-radius: 20px;
      border: none;
      background: #333;
      color: var(--text-color);
      font-size: 14px;
    }
    .chat-input button {
      background: var(--primary-color);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
    }
    .chat-input button i {
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
    }
  </style>
</head>
<body>
  <!-- Solo mensajes e input (la cabecera la tienes en el popup padre) -->
  <div class="chat-log" id="chatLog"></div>

  <div class="chat-input">
    <input
      type="text"
      id="userInput"
      placeholder="Escribí tu mensaje..."
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){ event.preventDefault(); sendMessage(); }"
    />
    <button onclick="sendMessage()">
      <i class="fas fa-paper-plane"></i>
    </button>
  </div>

  <script>
    const chatLog = document.getElementById("chatLog");
    const input   = document.getElementById("userInput");
  
    function appendMessage(role, content) {
      const msg = document.createElement("div");
      if (role === 'user') {
        msg.className = "message user";
        msg.textContent = content;
      } else {
        msg.className = "message bot";
        msg.innerHTML = `
          <img src="assets/icons/rocio.png" class="bot-avatar" alt="Rocío">
          <div class="bubble">${content}</div>
        `;
      }
      chatLog.appendChild(msg);
      chatLog.scrollTop = chatLog.scrollHeight;
    }
  
    const delay = ms => new Promise(r => setTimeout(r, ms));
  
    async function pollReply(sessionId, text) {
      const url = "https://n8n.smarteco.com.ar/webhook-test/atencion_cliente";
      while (true) {
        try {
          const res  = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text, sessionId })
          });
          if (res.ok) {
            const data = await res.json();
            console.log("Webhook devolvió:", data);
            // Normalizamos a un único objeto
            const record = Array.isArray(data) ? data[0] : data;
            const msgs   = record?.content?.messages;
            let reply;
            if (Array.isArray(msgs)) {
              reply = msgs[0]?.text;
            } else if (msgs && typeof msgs === 'object') {
              // si es objeto con clave "0", "1", ...
              const k = Object.keys(msgs)[0];
              reply = msgs[k]?.text;
            }
            if (reply) {
              return reply;
            }
          }
        } catch (e) {
          console.warn("Error al llamar al webhook, reintentando...", e);
        }
        // espera 2s y vuelve a preguntar
        await delay(2000);
      }
    }
  
    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      appendMessage("user", text);
      input.value = "";
  
      const sessionId = "s_" + Date.now();
      // aquí se queda en loop hasta recibir algo válido
      const botReply = await pollReply(sessionId, text);
      appendMessage("bot", botReply);
    }
  
    input.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
  

  
</body>
</html>
