<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestión de Usuarios - CRM Viviendas Sion</title>

  <!-- Bootstrap (opcional si ya lo cargás globalmente) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
  <!-- Roboto -->
  <link href="https://fonts.googleapis.com/css?family=Roboto&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="assets/css/usuarios.css"/>
</head>
<body>
  <div class="container py-4">
    <h2 class="mb-4">Gestión de Usuarios</h2>
    <button id="btnAdd" class="btn btn-primary mb-3">
      <span class="material-icons">person_add</span> Nuevo Usuario
    </button>

    <table id="usersTable" class="table table-dark table-striped align-middle">
      <thead>
        <tr>
          <th>Usuario</th>
          <th>Email</th>
          <th>Rol</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <!-- Se carga dinámicamente -->
      </tbody>
    </table>
  </div>

  <!-- Modal (Add / Edit) -->
  <div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
      <form id="userForm" class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Usuario</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="userId"/>
          <div class="mb-3">
            <label for="username" class="form-label">Usuario</label>
            <input type="text" id="username" class="form-control" required/>
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" class="form-control" required/>
          </div>
          <div class="mb-3">
            <label for="role" class="form-label">Rol</label>
            <select id="role" class="form-select" required>
              <option value="">Seleccione</option>
              <option value="Gerente Ventas">Gerente Ventas</option>
              <option value="Área Técnica">Área Técnica</option>
              <option value="Compras">Compras</option>
              <option value="Fábrica">Fábrica</option>
              <option value="Vendedor">Vendedor</option>
            </select>
          </div>
          <div class="mb-3 password-group">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" id="password" class="form-control" />
          </div>
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-success">Guardar</button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Bootstrap JS (opcional si ya lo cargás globalmente) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/usuarios.js"></script>
</body>
</html>
